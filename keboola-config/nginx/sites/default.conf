server {
    listen 8888;

    access_log /dev/stdout;
    error_log /dev/stderr;

    # Fallback page returned as 200 so platform health checks pass while the app
    # is still coming up. Narrowed to 502/504 only: connect-refused during cold
    # start and upstream timeouts. Real 4xx/5xx produced by the watched app are
    # no longer swallowed -- they surface at the browser so problems are visible.
    error_page 502 504 = /fallback.html;

    location = /fallback.html {
        root /tmp/continuous-pull;
        internal;
    }

    # Wrapper-owned pull-control API. Users MUST NOT define routes under /_api/
    # -- they will never be reached. This block is bundled in the wrapper image
    # and is restored by the wrapper's setup.sh on every container start.
    location /_api/ {
        proxy_pass http://127.0.0.1:8051;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # User-defined location snippets. The watched repo adds files under
    # keboola-config/nginx/conf.d/*.conf to route additional paths (e.g. /api/
    # to a second backend process). Snippets are included BEFORE the catch-all
    # location / below, so user routes take precedence over the default app proxy.
    include /app/keboola-config/nginx/conf.d/*.conf;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_intercept_errors on;
    }
}
