; Expose a UNIX socket so `supervisorctl` can control supervisord.
; /var/run is not writable by the non-root user supervisord runs as in
; this base image, so we put the socket in /tmp and pass -s to our
; supervisorctl calls (see pull_once.sh, re_setup.sh).
[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface
